<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>To-Do List - Autenticación</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
      .card-transition { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
      .oculto { display: none; }
    </style>
  </head>
  <body class="bg-slate-50 text-slate-800 font-sans min-h-screen antialiased flex flex-col justify-between">
    <main class="max-w-md w-full mx-auto px-4 py-16 flex-1 flex flex-col justify-center">
      
      <!-- Contenedor Dinámico -->
      <div class="bg-white p-8 rounded-3xl shadow-sm border border-slate-100 card-transition">
        
        <!-- Alertas de estado -->
        <div id="alert-error" class="oculto mb-4 p-3.5 text-xs font-medium rounded-xl bg-rose-50 border border-rose-200 text-rose-600 text-center"></div>
        <div id="alert-success" class="oculto mb-4 p-3.5 text-xs font-medium rounded-xl bg-emerald-50 border border-emerald-200 text-emerald-600 text-center"></div>

        <!-- VISTA: LOGIN -->
        <div id="vista-login">
          <header class="mb-6 text-center">
            <h2 class="text-2xl font-extrabold text-slate-900 tracking-tight">Iniciar Sesión</h2>
            <p class="text-xs text-slate-400 mt-1">Ingresa tus credenciales para acceder a tus tareas</p>
          </header>
          <form id="form-login" class="flex flex-col gap-4">
            <div class="flex flex-col gap-1">
              <label class="text-xs font-semibold text-slate-600 uppercase tracking-wider">Correo Electrónico</label>
              <input type="email" id="login-email" placeholder="ejemplo@correo.com" class="w-full px-4 py-2.5 rounded-xl border border-slate-200 focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-100 text-sm" required />
            </div>
            <div class="flex flex-col gap-1">
              <label class="text-xs font-semibold text-slate-600 uppercase tracking-wider">Contraseña</label>
              <input type="password" id="login-password" placeholder="••••••••" class="w-full px-4 py-2.5 rounded-xl border border-slate-200 focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-100 text-sm" required />
            </div>
            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-2.5 rounded-xl shadow-sm transition-all text-sm mt-2 cursor-pointer">🔑 Entrar al sistema</button>
          </form>
          <p onclick="alternarVistas()" class="text-center text-xs text-blue-600 font-medium mt-5 cursor-pointer hover:underline">¿No tienes una cuenta aún? Regístrate aquí</p>
        </div>

        <!-- VISTA: REGISTRO -->
        <div id="vista-registro" class="oculto">
          <header class="mb-6 text-center">
            <h2 class="text-2xl font-extrabold text-slate-900 tracking-tight">Crear Cuenta</h2>
            <p class="text-xs text-slate-400 mt-1">Regístrate para empezar a organizar tu día</p>
          </header>
          <form id="form-registro" class="flex flex-col gap-4">
            <div class="flex flex-col gap-1">
              <label class="text-xs font-semibold text-slate-600 uppercase tracking-wider">Nombre completo</label>
              <input type="text" id="reg-nombre" placeholder="David Santiago" class="w-full px-4 py-2.5 rounded-xl border border-slate-200 focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-100 text-sm" required />
            </div>
            <div class="flex flex-col gap-1">
              <label class="text-xs font-semibold text-slate-600 uppercase tracking-wider">Correo Electrónico</label>
              <input type="email" id="reg-email" placeholder="ejemplo@correo.com" class="w-full px-4 py-2.5 rounded-xl border border-slate-200 focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-100 text-sm" required />
            </div>
            <div class="flex flex-col gap-1">
              <label class="text-xs font-semibold text-slate-600 uppercase tracking-wider">Contraseña</label>
              <input type="password" id="reg-password" placeholder="Mínimo 6 caracteres" class="w-full px-4 py-2.5 rounded-xl border border-slate-200 focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-100 text-sm" required />
            </div>
            <button type="submit" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-medium py-2.5 rounded-xl shadow-sm transition-all text-sm mt-2 cursor-pointer">✨ Completar Registro</button>
          </form>
          <p onclick="alternarVistas()" class="text-center text-xs text-blue-600 font-medium mt-5 cursor-pointer hover:underline">¿Ya tienes cuenta? Inicia sesión aquí</p>
        </div>

      </div>
    </main>

    <footer class="py-6 text-center text-xs text-slate-400 border-t border-slate-100">
      To-Do App &copy; 2026 &bull; Secure Authentication Portal
    </footer>

    <script>
      const API_AUTH = '/api/auth';
      
      // Redirección inmediata si ya hay una sesión activa en esta máquina
      if(localStorage.getItem('token_todoapp')) {
          window.location.href = '/mis-tareas';
      }

      function alternarVistas() {
          document.getElementById('vista-login').classList.toggle('oculto');
          document.getElementById('vista-registro').classList.toggle('oculto');
          document.getElementById('alert-error').classList.add('oculto');
          document.getElementById('alert-success').classList.add('oculto');
      }

      function lanzarAlerta(tipo, msg) {
          const alert = document.getElementById(`alert-${tipo}`);
          alert.innerText = msg;
          alert.classList.remove('oculto');
          setTimeout(() => alert.classList.add('oculto'), 4000);
      }

      // SUBMIT REGISTRO
      document.getElementById('form-registro').addEventListener('submit', async (e) => {
          e.preventDefault();
          const nombre = document.getElementById('reg-nombre').value;
          const email = document.getElementById('reg-email').value;
          const password = document.getElementById('reg-password').value;

          try {
              const res = await fetch(`${API_AUTH}/registro`, {
                  method: 'POST',
                  headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify({ nombre, email, password })
              });
              const data = await res.json();
              if(!res.ok) throw new Error(data.error);

              lanzarAlerta('success', '¡Usuario creado! Redirigiendo al login...');
              document.getElementById('form-registro').reset();
              setTimeout(alternarVistas, 1500);
          } catch(err) { lanzarAlerta('error', err.message); }
      });

      // SUBMIT LOGIN
      document.getElementById('form-login').addEventListener('submit', async (e) => {
          e.preventDefault();
          const email = document.getElementById('login-email').value;
          const password = document.getElementById('login-password').value;

          try {
              const res = await fetch(`${API_AUTH}/login`, {
                  method: 'POST',
                  headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify({ email, password })
              });
              const data = await res.json();
              if(!res.ok) throw new Error(data.error);

              localStorage.setItem('token_todoapp', data.token);
              localStorage.setItem('usuario_todoapp', JSON.stringify(data.usuario));
              window.location.href = '/mis-tareas';
          } catch(err) { lanzarAlerta('error', err.message); }
      });
    </script>
  </body>
</html>
